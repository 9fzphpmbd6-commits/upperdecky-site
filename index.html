<style>
/* ========== RESET & BASE ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  overflow-x: hidden;
  overflow-y: auto;
  scroll-behavior: smooth;
  background: #0c1220;
  color: #f1f5f9;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
a { color: inherit; text-decoration: none; }

/* ========== VARIABLES ========== */
:root {
  --bg: #0c1220;
  --surface: #141c2e;
  --card: #1a2439;
  --card-border: rgba(255,255,255,0.06);
  --red: #ef4444;
  --blue: #38bdf8;
  --green: #22c55e;
  --amber: #f59e0b;
  --text: #f1f5f9;
  --muted: #94a3b8;
  --faint: #64748b;
  --transition: 0.18s cubic-bezier(0.16,1,0.3,1);
}

/* ========== UTILITY ========== */
.tabular { font-variant-numeric: tabular-nums; }
.container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

/* ========== ANIMATIONS ========== */
@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(1.6); }
}
@keyframes ticker-scroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* ========== SECTION SPACING ========== */
section { padding: 48px 0; }
section + section { padding-top: 0; }
.section-gap { margin-top: 56px; }

/* ========== NAVBAR ========== */
.navbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(12,18,32,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--card-border);
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.navbar-inner {
  max-width: 1200px;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.navbar-logo {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: color var(--transition);
}
.navbar-logo:hover { color: var(--red); }
.navbar-logo span { color: var(--red); }
.navbar-links {
  display: flex;
  align-items: center;
  gap: 8px;
}
.nav-link {
  font-size: 13px;
  font-weight: 600;
  padding: 8px 14px;
  border-radius: 6px;
  cursor: pointer;
  transition: background var(--transition), color var(--transition);
  color: var(--muted);
  text-decoration: none;
  position: relative;
}
.nav-link:hover { background: rgba(255,255,255,0.06); color: var(--text); }
.nav-link.active { color: var(--text); background: rgba(255,255,255,0.04); }
.nav-dropdown {
  position: relative;
}
.nav-dropdown-menu {
  position: absolute;
  top: 100%;
  right: 0;
  margin-top: 4px;
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 8px;
  padding: 6px 0;
  min-width: 200px;
  box-shadow: 0 12px 32px rgba(0,0,0,0.5);
  z-index: 200;
}
.nav-dropdown-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  transition: background var(--transition), color var(--transition);
}
.nav-dropdown-item:hover {
  background: rgba(255,255,255,0.06);
  color: var(--text);
}
.hamburger {
  display: none;
  background: none;
  border: none;
  color: var(--text);
  font-size: 24px;
  cursor: pointer;
  padding: 4px;
}
.mobile-menu {
  display: none;
  position: fixed;
  top: 56px;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(12,18,32,0.98);
  backdrop-filter: blur(12px);
  z-index: 99;
  padding: 24px;
  flex-direction: column;
  gap: 8px;
  overflow-y: auto;
}
.mobile-menu.open { display: flex; }
.mobile-menu-link {
  font-size: 16px;
  font-weight: 600;
  padding: 12px 16px;
  border-radius: 8px;
  color: var(--muted);
  cursor: pointer;
  transition: background var(--transition), color var(--transition);
}
.mobile-menu-link:hover { background: rgba(255,255,255,0.06); color: var(--text); }
.mobile-divider {
  height: 1px;
  background: var(--card-border);
  margin: 8px 0;
}
.mobile-section-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--faint);
  padding: 8px 16px 4px;
}

/* ========== 1. HERO ========== */
.hero {
  position: relative;
  overflow: visible;
  padding: 32px 0 16px;
  background: var(--bg);
}
.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    repeating-linear-gradient(
      -45deg,
      transparent,
      transparent 60px,
      rgba(239,68,68,0.03) 60px,
      rgba(239,68,68,0.03) 61px
    );
  pointer-events: none;
}
.hero-content {
  position: relative;
  text-align: center;
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  gap: 24px;
}
.hero-text-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.hero-mascot {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  object-fit: cover;
  filter: drop-shadow(0 0 20px rgba(239,68,68,0.35));
  flex-shrink: 0;
}
.hero-crosshair { width: 44px; height: 44px; }
.hero-title {
  font-size: 36px;
  font-weight: 800;
  letter-spacing: 3px;
  text-transform: uppercase;
  line-height: 1.1;
}
.hero-title span { color: var(--red); }
.hero-tagline {
  font-size: 13px;
  color: var(--muted);
  font-style: normal;
  font-weight: 600;
  letter-spacing: 0.5px;
}
.hero-manifesto {
  max-width: 600px;
  font-size: 15px;
  line-height: 1.6;
  color: var(--muted);
  margin-top: 4px;
}
.hero-manifesto strong {
  color: #f1f5f9;
  font-weight: 600;
}
.hero-kpis {
  display: flex;
  gap: 24px;
  margin-top: 2px;
  flex-wrap: wrap;
  justify-content: center;
}
.hero-kpi {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.hero-kpi-value {
  font-size: 18px;
  font-weight: 800;
  color: var(--blue);
  font-variant-numeric: tabular-nums lining-nums;
}
.hero-kpi-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--muted);
  font-weight: 500;
}
.hero-tip-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-top: 8px;
  padding: 10px 28px;
  background: transparent;
  border: 2px solid var(--red);
  border-radius: 999px;
  color: #f1f5f9;
  font-size: 14px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.18s cubic-bezier(0.16,1,0.3,1);
  text-decoration: none;
}
.hero-tip-btn:hover {
  background: var(--red);
  color: #fff;
  transform: scale(1.04);
}
.hero-tip-subtext {
  font-size: 12px;
  color: var(--faint);
  font-style: italic;
  margin-top: -2px;
}

/* ========== 2. TICKER ========== */
.ticker-bar {
  background: var(--surface);
  border-top: 1px solid rgba(239,68,68,0.3);
  border-bottom: 1px solid rgba(239,68,68,0.3);
  overflow: hidden;
  position: relative;
  height: 44px;
  display: flex;
  align-items: center;
}
.ticker-edge-dot {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 8px; height: 8px;
  background: var(--red);
  border-radius: 50%;
  z-index: 2;
}
.ticker-edge-dot.left { left: 12px; }
.ticker-edge-dot.right { right: 12px; }
.ticker-track {
  display: flex;
  white-space: nowrap;
  animation: ticker-scroll 40s linear infinite;
}
.ticker-track span {
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  padding: 0 32px;
  flex-shrink: 0;
}
.ticker-track .ticker-highlight { color: var(--text); font-weight: 600; }
.ticker-track .ticker-red { color: var(--red); }

/* ========== 3. LIVE GAMES ========== */
.live-games { padding-top: 48px; }
.section-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
}
.section-title {
  font-size: 22px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1.5px;
}
.live-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(239,68,68,0.15);
  color: var(--red);
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 4px 10px;
  border-radius: 4px;
}
.pulse-dot {
  width: 8px; height: 8px;
  background: var(--red);
  border-radius: 50%;
  animation: pulse-dot 1.5s ease-in-out infinite;
}
.games-scroll-wrapper {
  position: relative;
}
.games-scroll {
  display: flex;
  gap: 16px;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 8px;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.1) transparent;
}
.games-scroll::-webkit-scrollbar { height: 4px; }
.games-scroll::-webkit-scrollbar-track { background: transparent; }
.games-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
.game-card {
  flex-shrink: 0;
  width: 220px;
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 8px;
  overflow: hidden;
  scroll-snap-align: start;
  transition: transform var(--transition), border-color var(--transition);
}
.game-card:hover {
  transform: translateY(-2px);
  border-color: rgba(255,255,255,0.12);
}
.game-card-bar { height: 3px; width: 100%; }
.game-card-bar.live { background: var(--red); }
.game-card-bar.final { background: var(--muted); }
.game-card-bar.upcoming { background: var(--blue); opacity: 0.4; }
.game-card-body { padding: 12px 14px 10px; }
.game-team-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 0;
}
.game-team-logo {
  width: 28px; height: 28px;
  object-fit: contain;
  flex-shrink: 0;
}
.game-team-abbr {
  font-size: 14px;
  font-weight: 700;
  flex: 1;
  letter-spacing: 0.5px;
}
.game-team-score {
  font-size: 18px;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
  min-width: 24px;
  text-align: right;
}
.game-team-score.winner { color: var(--text); }
.game-team-score.loser { color: var(--muted); }
.game-status {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--card-border);
}
.game-inning {
  font-size: 12px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 6px;
}
.game-inning.live { color: var(--red); }
.game-inning.final { color: var(--muted); }
.game-inning.upcoming { color: var(--blue); }
.game-venue {
  font-size: 10px;
  color: var(--muted);
  text-align: right;
  max-width: 110px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.game-weather {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 0 2px;
  border-top: 1px solid rgba(255,255,255,0.06);
  margin-top: 6px;
  font-size: 11px;
  color: var(--text-secondary);
  flex-wrap: wrap;
}
.game-weather.dome {
  color: var(--blue);
  font-weight: 600;
  font-size: 11px;
}
.game-weather-detail {
  font-size: 10px;
  color: var(--muted);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 120px;
}
.game-weather-roof {
  font-size: 9px;
  color: var(--amber);
  font-weight: 600;
}
.scroll-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--text);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 5;
  transition: background var(--transition), border-color var(--transition);
}
.scroll-btn:hover { background: var(--card); border-color: rgba(255,255,255,0.2); }
.scroll-btn.left { left: -12px; }
.scroll-btn.right { right: -12px; }
.no-games-msg {
  text-align: center;
  padding: 32px;
  color: var(--muted);
  font-size: 14px;
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 8px;
}

/* ========== 4. FIND YOUR TEAM ========== */
.team-grid-section { }
.section-subtitle {
  font-size: 14px;
  color: var(--muted);
  margin-top: 4px;
  margin-bottom: 24px;
  font-weight: 400;
}
.divisions-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}
.division-col {}
.division-header {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
  padding: 8px 0 8px 12px;
  border-left: 3px solid var(--red);
  margin-bottom: 12px;
}
.team-card-sm {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 8px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition);
}
.team-card-sm:hover {
  transform: translateY(-1px);
  border-color: rgba(255,255,255,0.15);
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}
.team-card-sm img {
  width: 42px; height: 42px;
  object-fit: contain;
  border-radius: 50%;
  background: rgba(255,255,255,0.05);
  padding: 4px;
}
.team-card-info {}
.team-card-name {
  font-size: 13px;
  font-weight: 700;
}
.team-card-meta {
  font-size: 11px;
  color: var(--muted);
}

/* ========== 5. EXPLORE STATS ========== */
.stats-grid-section {}
.stats-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px;
}
.stat-card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 8px;
  padding: 16px 14px;
  cursor: pointer;
  transition: transform var(--transition), border-color var(--transition);
  text-align: center;
}
.stat-card:hover {
  transform: translateY(-2px);
  border-color: rgba(255,255,255,0.15);
}
.stat-card.active {
  border-left: 3px solid var(--red);
  background: rgba(239,68,68,0.06);
  border-color: rgba(239,68,68,0.2);
}
.stat-emoji { font-size: 24px; margin-bottom: 6px; }
.stat-label {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.5px;
  color: var(--text);
}
.stat-desc {
  font-size: 10px;
  color: var(--faint);
  margin-top: 2px;
}

/* ========== 7. SPOTLIGHT + LEADERBOARD ========== */
.spotlight-section {}
.spotlight-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}
.spotlight-card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-left: 3px solid var(--red);
  border-radius: 8px;
  padding: 24px;
}
.spotlight-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
}
.spotlight-headshot {
  width: 72px; height: 72px;
  border-radius: 50%;
  object-fit: cover;
  background: rgba(255,255,255,0.05);
  border: 2px solid var(--red);
}
.spotlight-name {
  font-size: 20px;
  font-weight: 800;
}
.spotlight-meta {
  font-size: 13px;
  color: var(--muted);
}
.spotlight-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}
.spotlight-stat {
  text-align: center;
  padding: 12px 8px;
  background: rgba(255,255,255,0.02);
  border-radius: 6px;
  border: 1px solid var(--card-border);
}
.spotlight-stat-val {
  font-size: 22px;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
  color: var(--blue);
}
.spotlight-stat-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  margin-top: 2px;
}
.leaderboard-card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 8px;
  padding: 24px;
}
.leaderboard-title {
  font-size: 18px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.leaderboard-title span { color: var(--amber); }
.lb-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 0;
  border-bottom: 1px solid var(--card-border);
  cursor: pointer;
  transition: background var(--transition);
}
.lb-row:hover { background: rgba(255,255,255,0.02); }
.lb-row:last-child { border-bottom: none; }
.lb-rank {
  width: 24px;
  font-size: 13px;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
  text-align: center;
  color: var(--muted);
}
.lb-rank.first { color: var(--red); }
.lb-headshot {
  width: 28px; height: 28px;
  border-radius: 50%;
  object-fit: cover;
  background: rgba(255,255,255,0.05);
}
.lb-name {
  flex: 1;
  font-size: 13px;
  font-weight: 600;
}
.lb-team {
  font-size: 11px;
  color: var(--muted);
  font-weight: 500;
  width: 32px;
  text-align: center;
}
.lb-val {
  font-size: 14px;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
  color: var(--blue);
  width: 50px;
  text-align: right;
}

/* ========== 8. FOOTER ========== */
.site-footer {
  margin-top: 56px;
  padding: 32px 0;
  border-top: 2px solid var(--red);
  background: var(--surface);
}
.footer-content {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.footer-copy {
  font-size: 13px;
  color: var(--muted);
}
.footer-link {
  font-size: 12px;
  color: var(--muted);
  text-decoration: none;
  transition: color var(--transition);
}
.footer-link:hover { color: var(--text); }

/* ========== LOADING ========== */
.loading-spinner {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 0;
  gap: 16px;
}
.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--card-border);
  border-top-color: var(--red);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.loading-text {
  font-size: 14px;
  color: var(--muted);
}
.error-msg {
  text-align: center;
  padding: 60px 24px;
  color: var(--muted);
}
.error-msg h3 {
  font-size: 20px;
  color: var(--text);
  margin-bottom: 8px;
}
.retry-btn {
  margin-top: 16px;
  padding: 10px 24px;
  background: var(--red);
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: opacity var(--transition);
}
.retry-btn:hover { opacity: 0.85; }

/* ========== PAGE LAYOUTS ========== */
.page-header {
  padding: 40px 0 24px;
}
.page-title {
  font-size: 28px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 2px;
}
.page-subtitle {
  font-size: 14px;
  color: var(--muted);
  margin-top: 4px;
}
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  padding: 8px 0;
  transition: color var(--transition);
}
.back-btn:hover { color: var(--text); }

/* ========== DATA TABLE ========== */
.data-table-wrap {
  overflow-x: auto;
  border: 1px solid var(--card-border);
  border-radius: 8px;
  background: var(--card);
}
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.data-table th {
  text-align: left;
  padding: 12px 14px;
  font-weight: 700;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  border-bottom: 2px solid var(--card-border);
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
  transition: color var(--transition);
}
.data-table th:hover { color: var(--text); }
.data-table th.sorted { color: var(--blue); }
.data-table th .sort-arrow { margin-left: 4px; font-size: 10px; }
.data-table td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--card-border);
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}
.data-table tr { transition: background var(--transition); cursor: pointer; }
.data-table tbody tr:hover { background: rgba(255,255,255,0.03); }
.data-table tr:last-child td { border-bottom: none; }
.player-cell {
  display: flex;
  align-items: center;
  gap: 10px;
}
.player-cell img {
  width: 32px; height: 32px;
  border-radius: 50%;
  object-fit: cover;
  background: rgba(255,255,255,0.05);
}
.player-cell-name {
  font-weight: 600;
}
.pagination {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 20px 0;
}
.page-btn {
  padding: 6px 14px;
  border-radius: 6px;
  border: 1px solid var(--card-border);
  background: var(--card);
  color: var(--text);
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all var(--transition);
}
.page-btn:hover { border-color: rgba(255,255,255,0.15); }
.page-btn.active { background: var(--red); border-color: var(--red); }
.page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ========== SEARCH & FILTER ========== */
.filters-row {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
  flex-wrap: wrap;
  align-items: center;
}
.search-input, .filter-select {
  padding: 10px 14px;
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 8px;
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  outline: none;
  transition: border-color var(--transition);
}
.search-input { flex: 1; min-width: 200px; }
.search-input::placeholder { color: var(--faint); }
.search-input:focus, .filter-select:focus {
  border-color: var(--blue);
}
.filter-select { min-width: 140px; }
.filter-select option { background: var(--card); color: var(--text); }

/* ========== PLAYER DETAIL ========== */
.player-hero {
  display: flex;
  align-items: center;
  gap: 24px;
  padding: 24px 0 32px;
}
.player-hero-img {
  width: 120px; height: 120px;
  border-radius: 50%;
  object-fit: cover;
  background: rgba(255,255,255,0.05);
  border: 3px solid var(--red);
}
.player-hero-info h1 {
  font-size: 32px;
  font-weight: 800;
  letter-spacing: 1px;
}
.player-hero-meta {
  font-size: 14px;
  color: var(--muted);
  margin-top: 4px;
}
.stats-section-title {
  font-size: 14px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--card-border);
}
.stats-grid-detail {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 32px;
}
.stat-box {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 8px;
  padding: 16px;
  text-align: center;
}
.stat-box-val {
  font-size: 24px;
  font-weight: 800;
  color: var(--blue);
  font-variant-numeric: tabular-nums;
}
.stat-box-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  margin-top: 4px;
}
.fun-stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 32px;
}
.fun-stat-card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 8px;
  padding: 16px;
  text-align: center;
}
.fun-stat-emoji { font-size: 28px; margin-bottom: 4px; }
.fun-stat-val {
  font-size: 20px;
  font-weight: 800;
  color: var(--text);
  font-variant-numeric: tabular-nums;
}
.fun-stat-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  margin-top: 2px;
}
.status-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.5px;
}
.status-badge.overdue { background: rgba(239,68,68,0.15); color: var(--red); }
.status-badge.due { background: rgba(251,146,60,0.15); color: #fb923c; }
.status-badge.on-pace, .status-badge.warming-up { background: rgba(245,158,11,0.15); color: var(--amber); }
.status-badge.cold { background: rgba(56,189,248,0.15); color: var(--blue); }
.grade-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 800;
}
.grade-a { background: rgba(34,197,94,0.15); color: var(--green); }
.grade-b { background: rgba(56,189,248,0.15); color: var(--blue); }
.grade-c { background: rgba(245,158,11,0.15); color: var(--amber); }
.grade-d, .grade-f { background: rgba(239,68,68,0.15); color: var(--red); }

/* ========== COMPARE PAGE ========== */
.compare-container {
  display: grid;
  grid-template-columns: 1fr 80px 1fr;
  gap: 0;
  align-items: start;
}
.compare-player-select {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 8px;
  padding: 20px;
}
.compare-vs {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  font-weight: 800;
  color: var(--red);
  padding-top: 100px;
}
.compare-row {
  display: grid;
  grid-template-columns: 1fr 80px 1fr;
  gap: 0;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid var(--card-border);
}
.compare-bar-wrap {
  height: 6px;
  background: rgba(255,255,255,0.06);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 4px;
}
.compare-bar {
  height: 100%;
  border-radius: 3px;
  transition: width 0.4s ease;
}
.compare-stat-label {
  text-align: center;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
}
.compare-val {
  font-size: 16px;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
}
.compare-left { text-align: right; padding-right: 16px; }
.compare-right { text-align: left; padding-left: 16px; }
.compare-headshot-area {
  text-align: center;
  margin-bottom: 16px;
}
.compare-headshot-area img {
  width: 80px; height: 80px;
  border-radius: 50%;
  object-fit: cover;
  background: rgba(255,255,255,0.05);
  border: 2px solid var(--card-border);
}
.compare-headshot-area .name {
  font-size: 15px;
  font-weight: 700;
  margin-top: 8px;
}
.compare-headshot-area .team-pos {
  font-size: 12px;
  color: var(--muted);
}
.compare-search {
  position: relative;
}
.compare-search-results {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  background: var(--surface);
  border: 1px solid var(--card-border);
  border-radius: 0 0 8px 8px;
  max-height: 240px;
  overflow-y: auto;
  z-index: 10;
}
.compare-search-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 14px;
  cursor: pointer;
  transition: background var(--transition);
  font-size: 13px;
}
.compare-search-item:hover { background: rgba(255,255,255,0.06); }
.compare-search-item img {
  width: 28px; height: 28px;
  border-radius: 50%;
  object-fit: cover;
  background: rgba(255,255,255,0.05);
}

/* ========== LEADERBOARD PAGES ========== */
.lb-page-header {
  padding: 40px 0 8px;
  text-align: center;
}
.lb-page-title {
  font-size: 32px;
  font-weight: 800;
  letter-spacing: 2px;
}
.lb-page-subtitle {
  font-size: 14px;
  color: var(--muted);
  margin-top: 8px;
  max-width: 600px;
  margin-left: auto;
  margin-right: auto;
}

/* ========== SCATTER PAGE ========== */
.scatter-container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}
.scatter-card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 8px;
  padding: 20px;
}
.scatter-card h3 {
  font-size: 14px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  margin-bottom: 16px;
}
.scatter-canvas-wrap {
  position: relative;
  height: 400px;
}
.scatter-canvas-wrap canvas {
  width: 100% !important;
  height: 100% !important;
}

/* ========== RESPONSIVE ========== */
@media (max-width: 900px) {
  .hero-title { font-size: 30px; }
  .divisions-grid { grid-template-columns: 1fr; gap: 24px; }
  .stats-grid { grid-template-columns: repeat(3, 1fr); }
  .spotlight-grid { grid-template-columns: 1fr; }
  .scroll-btn { display: none; }
  .scatter-container { grid-template-columns: 1fr; }
  .compare-container { grid-template-columns: 1fr; gap: 16px; }
  .compare-vs { padding-top: 0; padding-bottom: 8px; }
  .compare-row { grid-template-columns: 1fr 60px 1fr; }
  .stats-grid-detail { grid-template-columns: repeat(2, 1fr); }
  .fun-stats-grid { grid-template-columns: repeat(2, 1fr); }
  .navbar-links { display: none; }
  .hamburger { display: block; }
}
@media (max-width: 600px) {
  .hero-content { flex-direction: column; gap: 6px; }
  .hero-mascot { width: 48px; height: 48px; }
  .hero-title { font-size: 24px; letter-spacing: 2px; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .section-title { font-size: 18px; }
  .container { padding: 0 16px; }
  section { padding: 32px 0; }
  .section-gap { margin-top: 40px; }
  .player-hero { flex-direction: column; text-align: center; }
  .player-hero-img { width: 96px; height: 96px; }
  .stats-grid-detail { grid-template-columns: repeat(2, 1fr); }
  .fun-stats-grid { grid-template-columns: 1fr; }
}
@media (min-width: 901px) {
  .hamburger { display: none; }
  .mobile-menu { display: none !important; }
}

/* ========== DUAL TICKERS ========== */
.ticker-wrapper {
  border-top: 2px solid rgba(239,68,68,0.5);
  border-bottom: 2px solid rgba(239,68,68,0.5);
  background: linear-gradient(90deg, rgba(239,68,68,0.12) 0%, rgba(12,18,32,0.95) 30%, rgba(12,18,32,0.95) 70%, rgba(239,68,68,0.12) 100%);
  overflow: hidden;
  white-space: nowrap;
  padding: 10px 0;
}
.ticker-wrapper + .ticker-wrapper { border-top: none; }
.ticker-wrapper.hot-cold {
  border-top: 2px solid transparent;
  border-bottom: 2px solid transparent;
  border-image: linear-gradient(90deg, rgba(239,68,68,0.6), rgba(56,189,248,0.6)) 1;
  background: linear-gradient(90deg, rgba(239,68,68,0.1) 0%, rgba(12,18,32,0.95) 40%, rgba(12,18,32,0.95) 60%, rgba(56,189,248,0.1) 100%);
}
.ticker-wrapper .ticker-track span {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.5px;
  padding: 0 48px 0 0;
}
.ticker-blue { color: var(--blue); }

/* ========== PRESS BOX (AI EXPERTS) ========== */
.press-box-section { padding-top: 48px; }
.experts-row {
  display: flex;
  gap: 16px;
  overflow-x: auto;
  padding-bottom: 12px;
  justify-content: center;
  flex-wrap: wrap;
}
.card-container {
  perspective: 800px;
  width: 200px;
  height: 300px;
  flex-shrink: 0;
}
.card-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}
.card-container:hover .card-inner {
  transform: rotateY(180deg);
}
.card-front, .card-back {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 8px;
  overflow: hidden;
}
.card-front {
  border: 3px solid #f5f0e0;
  background: var(--surface);
}
.card-front::after {
  content: '';
  position: absolute;
  inset: 3px;
  border: 1px solid var(--red);
  border-radius: 4px;
  pointer-events: none;
}
.card-front img {
  width: 100%;
  height: 210px;
  object-fit: cover;
  object-position: top;
}
.card-front-info {
  padding: 8px 10px;
  background: linear-gradient(135deg, var(--red), #b91c2c);
  display: flex;
  justify-content: space-between;
  align-items: center;
  min-height: 56px;
}
.card-front-name {
  font-size: 13px;
  font-weight: 800;
  color: #fff;
  text-transform: uppercase;
  line-height: 1.2;
}
.card-front-title {
  font-size: 9px;
  color: rgba(255,255,255,0.8);
  font-weight: 500;
  margin-top: 1px;
}
.card-front-record {
  font-size: 10px;
  color: #fff;
  text-align: right;
  font-weight: 600;
  line-height: 1.3;
}
.card-back {
  transform: rotateY(180deg);
  border: 3px solid #f5f0e0;
  background: var(--surface);
  padding: 16px 14px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.card-back::after {
  content: '';
  position: absolute;
  inset: 3px;
  border: 1px solid var(--red);
  border-radius: 4px;
  pointer-events: none;
}
.card-back-title {
  font-size: 14px;
  font-weight: 800;
  color: var(--red);
  text-transform: uppercase;
  margin-bottom: 12px;
  text-align: center;
}
.card-back-pick {
  font-size: 12px;
  color: var(--text);
  margin-bottom: 8px;
  padding: 6px 8px;
  background: rgba(56,189,248,0.05);
  border-radius: 4px;
  border-left: 2px solid var(--blue);
}
.card-back-confidence {
  text-align: center;
  font-size: 18px;
  margin-top: 8px;
}

/* ========== THE DUGOUT ========== */
.dugout-section {
  text-align: center;
}
.dugout-social {
  margin: 20px 0 32px;
}
.x-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: #fff;
  color: #000;
  padding: 12px 32px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 16px;
  transition: all 0.2s;
  text-decoration: none;
  font-family: inherit;
  border: none;
  cursor: pointer;
}
.x-btn:hover {
  background: #e2e8f0;
}
.x-btn svg {
  width: 20px;
  height: 20px;
}
.featured-title {
  font-size: 22px;
  font-weight: 800;
  color: #fff;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 20px;
}
.creators-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 16px;
  text-align: left;
}
.creator-card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 10px;
  padding: 18px;
}
.creator-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}
.creator-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 18px;
  color: #fff;
  flex-shrink: 0;
}
.creator-name {
  font-weight: 700;
  color: #fff;
  font-size: 15px;
}
.creator-handle {
  font-size: 13px;
  color: var(--blue);
}
.creator-desc {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 12px;
  line-height: 1.4;
}
.follow-btn {
  display: inline-block;
  padding: 6px 16px;
  border: 1px solid var(--blue);
  color: var(--blue);
  border-radius: 50px;
  font-size: 12px;
  font-weight: 600;
  transition: all 0.2s;
  text-decoration: none;
}
.follow-btn:hover {
  background: var(--blue);
  color: var(--bg);
}


/* ========== RADAR GUN COUNTDOWN ========== */
.radar-group {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  align-items: center;
  gap: 6px;
  z-index: 2;
}
.radar-side-label {
  font-family: var(--font-heading);
  font-size: 9px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  writing-mode: vertical-lr;
  transform: rotate(180deg);
  line-height: 1.2;
  text-align: center;
  white-space: nowrap;
  color: #00dcff;
  text-shadow: 0 0 8px rgba(0,220,255,0.4);
}
.radar-gun {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.radar-body {
  width: 140px;
  background: radial-gradient(ellipse at 50% 30%, #2a2a2a 0%, #111 60%, #0a0a0a 100%);
  border: 2px solid #444;
  border-radius: 14px 14px 10px 10px;
  padding: 8px 10px 10px;
  box-shadow:
    0 0 30px rgba(0,220,255,0.10),
    inset 0 1px 0 rgba(255,255,255,0.08),
    0 4px 12px rgba(0,0,0,0.6);
}
.radar-top-label {
  font-family: var(--font-heading);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #00dcff;
  text-align: center;
  margin-bottom: 4px;
  text-shadow: 0 0 8px rgba(0,220,255,0.6);
}
.radar-screen {
  background: #0a0a0a;
  border: 1px solid #333;
  border-radius: 6px;
  padding: 6px 6px 5px;
  margin-bottom: 5px;
  position: relative;
  overflow: hidden;
}
.radar-screen::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(180deg, rgba(0,220,255,0.03) 0%, transparent 50%, rgba(0,220,255,0.02) 100%);
  pointer-events: none;
}
.radar-days-row {
  display: flex;
  align-items: baseline;
  justify-content: center;
  gap: 4px;
  margin-bottom: 1px;
}
.radar-big-num {
  font-family: var(--font-heading);
  font-size: 46px;
  font-weight: 900;
  color: #00dcff;
  line-height: 1;
  text-shadow: 0 0 20px rgba(0,220,255,0.7), 0 0 40px rgba(0,220,255,0.3);
  letter-spacing: -1px;
}
.radar-days-label {
  font-family: var(--font-heading);
  font-size: 13px;
  font-weight: 700;
  color: #44e8ff;
  letter-spacing: 2px;
  text-transform: uppercase;
  text-shadow: 0 0 10px rgba(0,220,255,0.5);
}
.radar-hms {
  display: flex;
  justify-content: center;
  gap: 2px;
  font-family: var(--font-heading);
  font-size: 15px;
  font-weight: 700;
  color: #00dcff;
  text-shadow: 0 0 10px rgba(0,220,255,0.5);
  letter-spacing: 1px;
}
.radar-hms-sep {
  color: #00dcff;
  opacity: 0.5;
  animation: blink-sep 1s step-end infinite;
}
@keyframes blink-sep {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 0.15; }
}
.radar-bottom-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 4px;
}
.radar-event-label {
  font-family: var(--font-heading);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #888;
}
.radar-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #22c55e;
  box-shadow: 0 0 6px rgba(34,197,94,0.8);
  animation: radar-pulse 1.5s ease-in-out infinite;
}
@keyframes radar-pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.radar-handle {
  width: 32px; height: 14px;
  background: linear-gradient(180deg, #333 0%, #1a1a1a 100%);
  border: 1px solid #444; border-top: none;
  border-radius: 0 0 6px 6px;
}
.radar-handle::before {
  content: '';
  display: block;
  margin: 3px auto 0;
  width: 14px; height: 3px;
  background: #555; border-radius: 2px;
}
/* Post-Opening Day state */
.radar-live .radar-big-num {
  font-size: 22px;
  color: #22c55e;
  text-shadow: 0 0 20px rgba(34,197,94,0.7), 0 0 40px rgba(34,197,94,0.3);
  letter-spacing: 2px;
}
.radar-live .radar-top-label {
  color: #22c55e;
  text-shadow: 0 0 8px rgba(34,197,94,0.6);
}
@media (max-width: 900px) {
  .radar-group {
    position: static;
    transform: none;
    justify-content: center;
    margin-bottom: 8px;
  }
  .radar-side-label { display: none; }
  .radar-body { width: 120px; padding: 6px 8px 8px; }
  .radar-big-num { font-size: 36px; }
  .radar-hms { font-size: 13px; }
}
@media (max-width: 600px) {
  .radar-body { width: 110px; }
  .radar-big-num { font-size: 30px; }
  .radar-hms { font-size: 12px; }
  .radar-days-label { font-size: 11px; }
}

/* ========== LLHR TRACKER + GIVEAWAY ========== */

.llhr-count-label {

.llhr-last {

.llhr-last strong {

.llhr-giveaway {

.llhr-giveaway-title {

.llhr-step {

.llhr-follow-btn {

.llhr-expand-btn {

.llhr-event-list {

.llhr-event-player {

}
@media (max-width: 600px) {

/* ========== FOOTER TIP LINKS ========== */
.footer-tip-links {
  margin: 8px 0;
}
.footer-tip-links a {
  margin: 0 8px;
  color: var(--muted);
  font-size: 12px;
  text-decoration: none;
  transition: color var(--transition);
}
.footer-tip-links a:hover { color: var(--text); }

/* ========== TIP MODAL ========== */
.tip-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(6px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from {opacity:0} to {opacity:1} }
.tip-modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px 28px;
  max-width: 340px;
  width: 90%;
  text-align: center;
  position: relative;
  animation: slideUp 0.25s ease;
}
@keyframes slideUp { from {transform:translateY(20px);opacity:0} to {transform:translateY(0);opacity:1} }
.tip-modal-close {
  position: absolute;
  top: 12px;
  right: 14px;
  background: none;
  border: none;
  color: var(--muted);
  font-size: 20px;
  cursor: pointer;
  line-height: 1;
}
.tip-modal-close:hover { color: var(--text); }
.tip-modal h3 {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: 1px;
  margin: 0 0 4px;
  color: var(--text);
}
.tip-modal .tip-subtitle {
  font-size: 13px;
  color: var(--muted);
  margin: 0 0 20px;
  font-style: italic;
}
.tip-qr {
  width: 220px;
  height: auto;
  border-radius: 12px;
  background: #fff;
  padding: 8px;
  margin: 0 auto 16px;
  display: block;
}
.tip-venmo-link {
  display: inline-block;
  background: #008CFF;
  color: #fff;
  font-weight: 700;
  font-size: 14px;
  padding: 10px 28px;
  border-radius: 24px;
  text-decoration: none;
  letter-spacing: 0.5px;
  transition: background 0.15s;
}
.tip-venmo-link:hover { background: #006fcc; }
.tip-modal .tip-or {
  font-size: 11px;
  color: var(--muted);
  margin: 12px 0 0;
}

.navbar-mascot {

/* ========== HIT OR SPIT — PROMO BANNER ========== */
.hos-banner {
  position: relative;
  overflow: hidden;
  background: linear-gradient(135deg, #141c2e 0%, #1a2439 50%, #141c2e 100%);
  border-top: 2px solid rgba(212,168,67,0.4);
  border-bottom: 2px solid rgba(212,168,67,0.4);
  cursor: pointer;
  transition: background 0.25s ease;
}
.hos-banner:hover { background: linear-gradient(135deg, #182240 0%, #1f2e4a 50%, #182240 100%); }
.hos-banner::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(-45deg, transparent, transparent 20px, rgba(212,168,67,0.02) 20px, rgba(212,168,67,0.02) 21px);
  pointer-events: none;
}
.hos-banner-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px 24px;

  align-items: center;

}
.hos-banner-card-preview {

  height: 110px;
  border-radius: 8px;
  background: #e8ddd0;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);

  transform: rotate(-4deg);

.hos-banner:hover .hos-banner-card-preview { transform: rotate(-2deg) scale(1.05); }
.hos-banner-card-topbar {

.hos-banner-card-topbar span {

}
.hos-banner-card-photo {

  background: radial-gradient(ellipse at 50% 55%, #182d4a 0%, #0e1a30 100%);

  align-items: flex-end;

  overflow: hidden;

.hos-banner-card-photo img {
  width: 65px;
  height: auto;

.hos-banner-card-name {
  background: linear-gradient(90deg, #c8102e, #e63946);

.hos-banner-text {
  flex: 1;

.hos-banner-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(212,168,67,0.15);
  color: #d4a843;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;

.hos-banner-badge .pulse-dot { background: #d4a843; }
.hos-banner-title {

.hos-overlay {

/* ========== THE BASEBALL CARD ========== */
.hos-card-wrapper {
  width: 310px;
  max-width: 90vw;
  perspective: 800px;
}
.hos-card {
  width: 100%;
  border-radius: 14px;
  overflow: hidden;
  position: relative;
  background: #e8ddd0;
  box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.4);
  transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
  touch-action: pan-y;
  user-select: none;
}
.hos-card.swipe-right {
  transform: translateX(120%) rotate(14deg);

.hos-swipe-label.lbl-spit { color: #ef4444; }
.hos-swipe-label.lbl-hit { color: #22c55e; }

.hos-consensus.visible { opacity: 1; }

  100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.4); }
}
.spit-burst-container {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 1100;
}
.spit-burst-emoji {
  position: absolute;
  font-size: 32px;
  animation: spit-burst 0.7s ease-out forwards;
}

/* Hit flash */
@keyframes hit-flash {
  0% { opacity: 0; transform: scale(0.5); }
  30% { opacity: 1; transform: scale(1.2); }
  100% { opacity: 0; transform: scale(2); }
}
.hit-flash-emoji {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0.5);

  z-index: 1100;

/* ========== SEO HELPERS ========== */
var SEO_BASE_TITLE = 'UpperDecky — Free MLB Analytics';
var SEO_BASE_DESC = 'Free MLB batter analytics. No paywalls. No subscriptions. No BS. Advanced Statcast data for every hitter.';

function updateSEO(opts) {
  var title = opts.title || SEO_BASE_TITLE;
  var desc = opts.description || SEO_BASE_DESC;
  var canonical = 'https://upperrdecky.com/' + (opts.path ? '#' + opts.path : '');
  document.title = title;
  var metaDesc = document.querySelector('meta[name="description"]');
  if (metaDesc) metaDesc.setAttribute('content', desc);
  var ogTitle = document.querySelector('meta[property="og:title"]');
  if (ogTitle) ogTitle.setAttribute('content', title);
  var ogDesc = document.querySelector('meta[property="og:description"]');
  if (ogDesc) ogDesc.setAttribute('content', desc);
  var ogUrl = document.querySelector('meta[property="og:url"]');
  if (ogUrl) ogUrl.setAttribute('content', canonical);
  var twTitle = document.querySelector('meta[name="twitter:title"]');
  if (twTitle) twTitle.setAttribute('content', title);
  var twDesc = document.querySelector('meta[name="twitter:description"]');
  if (twDesc) twDesc.setAttribute('content', desc);
  var link = document.querySelector('link[rel="canonical"]');
  if (link) link.setAttribute('href', canonical);
  // Update JSON-LD
  var ld = document.getElementById('seo-jsonld');
  if (ld) {
    var data = JSON.parse(ld.textContent);
    if (data['@graph']) {
      data['@graph'].forEach(function(item) {
        if (item['@type'] === 'WebPage') {
          item.name = title;
          item.description = desc;
          item.url = canonical;
        }
      });
      ld.textContent = JSON.stringify(data);
    }
  }
}

function setRouteSEO(route, context) {
  context = context || {};
  if (route === '/' || route === '') {
    updateSEO({title: SEO_BASE_TITLE, description: SEO_BASE_DESC, path: '/'});
  } else if (route === '/players' || route.startsWith('/players?')) {
    var sortLabel = context.sort ? ' — Sorted by ' + context.sort : '';
    updateSEO({
      title: 'MLB Player Stats & Rankings' + sortLabel + ' | UpperDecky',
      description: 'Browse and compare 461+ MLB batters. Sort by batting average, home runs, exit velocity, barrel rate, xwOBA, and more Statcast metrics. Free forever.',
      path: route
    });
  } else if (route.match(/^\/player\//)) {
    var p = context.player;
    if (p) {
      updateSEO({
        title: p.full_name + ' Stats & Statcast Data — ' + p.team + ' | UpperDecky',
        description: p.full_name + ' (' + p.team + ' ' + p.position + ') — .'+((p.ba||0)*1000|0)+' AVG, ' + (p.home_runs||0) + ' HR, ' + (p.avg_launch_speed||0).toFixed(1) + ' mph EV, ' + (p.barrel_rate||0).toFixed(1) + '% BRL. Free advanced Statcast analytics at UpperDecky.',
        path: route
      });
    } else {
      updateSEO({title: 'Player Stats | UpperDecky', description: 'Detailed MLB player analytics with Statcast data. Free forever.', path: route});
    }
  } else if (route.match(/^\/team\//)) {
    var t = context.team;
    if (t) {
      updateSEO({
        title: t.full_name + ' Roster & Stats | UpperDecky',
        description: 'Full ' + t.full_name + ' batter roster with Statcast analytics. Exit velocity, barrel rate, xwOBA, and more for every ' + t.name + ' hitter. Free.',
        path: route
      });
    } else {
      updateSEO({title: 'Team Stats | UpperDecky', path: route});
    }
  } else if (route === '/compare') {
    updateSEO({
      title: 'Compare MLB Players Side by Side | UpperDecky',
      description: 'Compare any two MLB batters head-to-head. Statcast metrics, batting stats, and advanced analytics side by side. Free.',
      path: '/compare'
    });
  } else if (route === '/scatter') {
    updateSEO({
      title: 'MLB Height & Weight vs Power — Scatter Plot | UpperDecky',
      description: 'Interactive scatter plots showing how MLB hitter size correlates with power. Height vs HR, weight vs HR. Free Statcast visualization.',
      path: '/scatter'
    });
  } else if (route.match(/^\/leaderboard\//)) {
    var lbNames = {
      'due-for': {t: 'Barrel Drought Leaderboard', d: 'Which MLB hitters are barreling up but not hitting home runs? Find out who\'s due for a big fly.'},
      'thicc-boy': {t: 'Thicc Boy Index — Power Per Pound', d: 'MLB\'s most efficient power hitters by body weight. Who packs the most punch per pound?'},
      'plate-discipline': {t: 'Plate Discipline Leaderboard', d: 'The best eyes in baseball. MLB hitters ranked by plate discipline — walk rate, chase rate, and more.'},
      'hbp': {t: 'HBP Pain Index', d: 'Which MLB hitters get plunked the most? Hit-by-pitch leaders and the batters who wear it.'},
      'full-moon': {t: 'Full Moon Effect — Lunar Batting Average', d: 'Do MLB hitters really perform differently under a full moon? We ran the numbers.'}
    };
    var lbSlug = route.replace('/leaderboard/', '');
    var lb = lbNames[lbSlug] || {t: 'Leaderboard', d: 'Fun MLB leaderboards with unique Statcast analytics.'};
    updateSEO({
      title: lb.t + ' | UpperDecky',
      description: lb.d + ' Free at UpperDecky.',
      path: route
    });
  }
}

function fmtBa(v) {
  if (v == null) return '—';
  return v < 1 ? (''+v.toFixed(3)).replace(/^0/,'') : v.toFixed(3);
}
function fmtPct(v) {
  if (v == null) return '—';
  return v.toFixed(1) + '%';
}
function fmtNum(v, dec) {
  if (v == null) return '—';
  if (dec != null) return v.toFixed(dec);
  return typeof v === 'number' ? (Number.isInteger(v) ? ''+v : v.toFixed(1)) : ''+v;
}

// --- Data Cache ---
var dataCache = {};
async function fetchJSON(url, cacheKey) {
  if (cacheKey && dataCache[cacheKey]) return dataCache[cacheKey];
  var resp = await fetch(url);
  if (!resp.ok) throw new Error('HTTP ' + resp.status);
  var data = await resp.json();
  if (cacheKey) dataCache[cacheKey] = data;
  return data;
}

function RadarCountdown() {
  var _cd = useState(null), cd = _cd[0], setCd = _cd[1];

  useEffect(function() {
    function calc() {
      var now = new Date();
      var diff = OPENING_DAY.getTime() - now.getTime();
      if (diff <= 0) return setCd({done: true});
      var days = Math.floor(diff / 86400000);
      var hrs = Math.floor((diff % 86400000) / 3600000);
      var mins = Math.floor((diff % 3600000) / 60000);
      var secs = Math.floor((diff % 60000) / 1000);
      setCd({done: false, days: days, hrs: hrs, mins: mins, secs: secs});
    }
    calc();
    var id = setInterval(calc, 1000);
    return function() { clearInterval(id); };

function DualTickers(props) {

    var byHR = batters.slice().sort(function(a,b){return (b.home_runs||0)-(a.home_runs||0);});
    var items = [];
    for (var i=0; i<10 && i<byHR.length; i++) {
      var p = byHR[i];
      items.push(p.full_name.split(' ').pop().toUpperCase() + ' ' + (p.home_runs||0));
    }
    return '\uD83C\uDFE0 HR LEADERS: ' + items.join(' \u2022 ');
  }, [batters]);

  var hotCold = useMemo(function() {
    if (!batters || !batters.length) return {hot:'', cold:''};
    var byBA = batters.slice().filter(function(b){return b.ba != null;}).sort(function(a,b){return (b.ba||0)-(a.ba||0);});

      hotItems.push(p.full_name.split(' ').pop().toUpperCase() + ' ' + fmtBa(p.ba) + ' L14');

        ),
        h('span', null,

var weatherCache = {};
function fetchWeather(venueName) {
  if (weatherCache[venueName]) return Promise.resolve(weatherCache[venueName]);
  var park = null;
  for (var k in BALLPARKS) {
    if (venueName && venueName.indexOf(k) >= 0 || k.indexOf(venueName) >= 0) { park = BALLPARKS[k]; break; }
  }
  if (!park) {
    // Try partial match
    var vnLow = (venueName||'').toLowerCase();
    for (var k2 in BALLPARKS) {
      if (vnLow.indexOf(k2.toLowerCase().split(' ')[0]) >= 0) { park = BALLPARKS[k2]; break; }
    }
  }
  if (!park) return Promise.resolve(null);
  if (park.roof === 'dome') {
    var result = {dome: true, roof: 'dome'};
    weatherCache[venueName] = result;
    return Promise.resolve(result);
  }
  return fetch('/.netlify/functions/weather?lat=' + park.lat + '&lon=' + park.lon)
    .then(function(r){ return r.json(); })
    .then(function(w){
      w.roof = park.roof;
      w.dome = false;
      weatherCache[venueName] = w;
      return w;
    })
    .catch(function(){
      return null;
    });
}

// ===========================

// ===========================
function PlayersPage(props) {
  var batters = props.batters;
  var teams = props.teams;
  var hashFull = window.location.hash;
  var sortParam = '';
  if (hashFull.indexOf('?sort=') >= 0) {
    sortParam = hashFull.split('?sort=')[1];
  }
  var _search = useState(''), search = _search[0], setSearch = _search[1];
  var _team = useState(''), teamFilter = _team[0], setTeamFilter = _team[1];
  var _sort = useState(sortParam || 'ops'), sortKey = _sort[0], setSortKey = _sort[1];
  var _dir = useState('desc'), sortDir = _dir[0], setSortDir = _dir[1];
  var _page = useState(1), page = _page[0], setPage = _page[1];

  var filtered = useMemo(function() {
    if (!batters) return [];
    var data = batters.slice();
    if (search) {
      var q = search.toLowerCase();
      data = data.filter(function(b){ return b.full_name.toLowerCase().indexOf(q)>=0; });
    }
    if (teamFilter) {
      data = data.filter(function(b){ return b.team === teamFilter; });
    }
    data.sort(function(a,b) {
      var av = a[sortKey], bv = b[sortKey];
      if (av == null) av = -Infinity;
      if (bv == null) bv = -Infinity;
      return sortDir === 'desc' ? bv - av : av - bv;
    });
    return data;
  }, [batters, search, teamFilter, sortKey, sortDir]);

  var totalPages = Math.ceil(filtered.length / PER_PAGE);
  var pageData = filtered.slice((page-1)*PER_PAGE, page*PER_PAGE);

  function handleSort(key) {
    if (sortKey === key) {
      setSortDir(sortDir === 'desc' ? 'asc' : 'desc');
    } else {
      setSortKey(key);
      setSortDir('desc');
    }
    setPage(1);
  }

  var columns = [
    {key:'rank', label:'#', nosort:true},
    {key:'full_name', label:'Player', nosort:true},
    {key:'team', label:'Team', nosort:true},
    {key:'ba', label:'BA'},
    {key:'home_runs', label:'HR'},
    {key:'ops', label:'OPS'},
    {key:'avg_launch_speed', label:'EV'},
    {key:'barrel_rate', label:'BRL%'},
    {key:'xwoba', label:'xwOBA'},
  ];

  var teamList = useMemo(function() {
    if (!teams) return [];
    return teams.slice().sort(function(a,b){ return a.abbreviation < b.abbreviation ? -1 : 1; });
  }, [teams]);

  if (!batters) return h(Loading);

  function sortArrow(key) {
    if (sortKey !== key) return '';
    return sortDir === 'desc' ? ' \u25BC' : ' \u25B2';
  }

  return h('section', null,
    h('div', {className:'container'},
      h('div', {className:'page-header'},
        h('h1', {className:'page-title'}, 'ALL PLAYERS'),
        h('p', {className:'page-subtitle'}, filtered.length + ' batters'),
        h(DataBadge, {dashboard: props.dashboard, style:{marginTop:4}})
      ),
      h('div', {className:'filters-row'},
        h('input', {className:'search-input', placeholder:'Search by name...', value: search, onChange: function(e){setSearch(e.target.value);setPage(1);}}),
        h('select', {className:'filter-select', value: teamFilter, onChange: function(e){setTeamFilter(e.target.value);setPage(1);}},
          h('option', {value:''}, 'All Teams'),
          teamList.map(function(t){ return h('option', {key:t.abbreviation, value:t.abbreviation}, t.abbreviation + ' - ' + t.name); })
        )
      ),
      h('div', {className:'data-table-wrap'},
        h('table', {className:'data-table'},
          h('thead', null,
            h('tr', null,
              columns.map(function(col) {
                return h('th', {
                  key: col.key,
                  className: sortKey===col.key ? 'sorted' : '',
                  onClick: col.nosort ? undefined : function(){handleSort(col.key);},
                  style: col.nosort ? {cursor:'default'} : undefined
                }, col.label, !col.nosort && h('span', {className:'sort-arrow'}, sortArrow(col.key)));
              })
            )
          ),
          h('tbody', null,
            pageData.map(function(b, i) {
              var globalRank = (page-1)*PER_PAGE + i + 1;
              return h('tr', {key: b.batter_id, onClick: function(){navigate('/player/'+b.batter_id);}},
                h('td', null, globalRank),
                h('td', null,
                  h('div', {className:'player-cell'},
                    h('img', {src: b.headshot_url, alt: b.full_name, loading:'lazy'}),
                    h('span', {className:'player-cell-name'}, b.full_name)
                  )
                ),
                h('td', null, b.team),
                h('td', null, fmtBa(b.ba)),
                h('td', null, b.home_runs),
                h('td', null, fmtBa(b.ops)),
                h('td', null, fmtNum(b.avg_launch_speed, 1)),
                h('td', null, fmtPct(b.barrel_rate)),
                h('td', null, fmtBa(b.xwoba))
              );
            })
          )
        )
      ),
      totalPages > 1 && h('div', {className:'pagination'},
        h('button', {className:'page-btn', disabled: page<=1, onClick: function(){setPage(page-1);}}, '\u2039 Prev'),
        Array.from({length: Math.min(totalPages, 7)}, function(_, i) {
          var p;
          if (totalPages <= 7) { p = i+1; }
          else if (page <= 4) { p = i+1; }
          else if (page >= totalPages - 3) { p = totalPages - 6 + i; }
          else { p = page - 3 + i; }
          return h('button', {key:p, className:'page-btn' + (p===page ? ' active' : ''), onClick: function(){setPage(p);}}, p);
        }),
        h('button', {className:'page-btn', disabled: page>=totalPages, onClick: function(){setPage(page+1);}}, 'Next \u203A')
      )
    )
  );
}


// ===========================
// PLAYER RADAR CHART
// ===========================
function PlayerRadarChart(props) {
  var p = props.player;
  var canvasRef = useRef(null);
  var chartRef = useRef(null);

  useEffect(function() {
    if (!canvasRef.current || !p) return;
    if (chartRef.current) chartRef.current.destroy();

    // Normalize stats to 0-100 scale for radar
    var power = Math.min(100, (p.barrel_rate || 0) * 5); // 20% barrel = 100
    var contact = Math.min(100, (p.ba || 0) * 333);       // .300 BA = ~100
    var eye = Math.min(100, Math.max(0, 100 - (p.chase_rate || 30) * 2.5)); // lower chase = higher
    var hardHit = Math.min(100, (p.hard_hit_rate || 0) * 1.8); // 55% = ~100
    var patience = Math.min(100, (p.obp || 0) * 250);     // .400 OBP = 100
    var discipline = Math.min(100, (p.plate_discipline_score || 0));

    chartRef.current = new Chart(canvasRef.current, {
      type: 'radar',
      data: {
        labels: ['Power', 'Contact', 'Eye', 'Hard Hit', 'Patience', 'Discipline'],
        datasets: [{
          label: p.full_name,
          data: [power, contact, eye, hardHit, patience, discipline],
          backgroundColor: 'rgba(227, 38, 54, 0.2)',
          borderColor: '#e32636',
          borderWidth: 2,
          pointBackgroundColor: '#e32636',
          pointBorderColor: '#fff',
          pointRadius: 4
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: function(ctx) {
                return ctx.label + ': ' + ctx.raw.toFixed(0) + '/100';
              }
            }
          }
        },
        scales: {
          r: {
            beginAtZero: true,
            max: 100,

// --- Sound Effects (Web Audio API) ---
var _hosAudioCtx = null;
function getHosAudio() {
  if (!_hosAudioCtx) {
    try { _hosAudioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  return _hosAudioCtx;
}

function playSpitSound() {
  var ctx = getHosAudio();
  if (!ctx) return;
  // Wet "ptooey" — quick white noise burst with lowpass sweep
  var dur = 0.18;
  var bufSize = ctx.sampleRate * dur;
  var buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  var data = buf.getChannelData(0);
  for (var i = 0; i < bufSize; i++) {
    data[i] = (Math.random() * 2 - 1) * (1 - i / bufSize);
  }
  var src = ctx.createBufferSource();
  src.buffer = buf;
  var filt = ctx.createBiquadFilter();
  filt.type = 'bandpass';
  filt.frequency.setValueAtTime(1200, ctx.currentTime);
  filt.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + dur);
  filt.Q.value = 2;
  var gain = ctx.createGain();
  gain.gain.setValueAtTime(0.35, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + dur);
  src.connect(filt);
  filt.connect(gain);
  gain.connect(ctx.destination);
  src.start();
}

function playBatCrack() {
  var ctx = getHosAudio();
  if (!ctx) return;
  // Sharp crack: short noise burst + resonant ping
  var dur = 0.12;
  var bufSize = ctx.sampleRate * dur;
  var buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  var data = buf.getChannelData(0);
  for (var i = 0; i < bufSize; i++) {
    var t = i / ctx.sampleRate;
    data[i] = (Math.random() * 2 - 1) * Math.exp(-t * 40) * 0.7
            + Math.sin(t * 2200) * Math.exp(-t * 25) * 0.5;
  }
  var src = ctx.createBufferSource();
  src.buffer = buf;
  var filt = ctx.createBiquadFilter();
  filt.type = 'highpass';
  filt.frequency.value = 800;
  var gain = ctx.createGain();
  gain.gain.setValueAtTime(0.5, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + dur);
  src.connect(filt);
  filt.connect(gain);
  gain.connect(ctx.destination);
  src.start();
}

// --- Emoji Burst (spit) ---
function spawnSpitBurst() {
  var container = document.createElement('div');
  container.className = 'spit-burst-container';
  var emojis = ['\uD83D\uDE2E\u200D\uD83D\uDCA8', '\uD83D\uDCA6', '\uD83E\uDD2E', '\uD83D\uDC4E'];
  var cx = window.innerWidth / 2;
  var cy = window.innerHeight / 2;
  for (var i = 0; i < 8; i++) {
    var span = document.createElement('span');
    span.className = 'spit-burst-emoji';
    span.textContent = emojis[i % emojis.length];
    var angle = (i / 8) * Math.PI * 2 + (Math.random() - 0.5) * 0.5;
    var dist = 60 + Math.random() * 80;
    span.style.left = cx + 'px';
    span.style.top = cy + 'px';
    span.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
    span.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
    container.appendChild(span);
  }
  document.body.appendChild(container);
  setTimeout(function() { container.remove(); }, 800);
}

                  h('div', {className:'hos-card-stat-label'}, 'HR')
                ),
                h('div', {className:'hos-card-stat'},
                  h('div', {className:'hos-card-stat-val'}, fmtBa(current.card_ba != null ? current.card_ba : current.ba)),
                  h('div', {className:'hos-card-stat-label'}, 'AVG')
                ),
                h('div', {className:'hos-card-stat'},
                  h('div', {className:'hos-card-stat-val'}, fmtBa(current.card_ops != null ? current.card_ops : current.ops)),
                  h('div', {className:'hos-card-stat-label'}, 'OPS')
                ),
                h('div', {className:'hos-card-stat'},
                  h('div', {className:'hos-card-stat-val'}, current.card_barrel != null ? fmtPct(current.card_barrel) : (current.barrel_rate != null ? fmtPct(current.barrel_rate) : '\u2014')),
                  h('div', {className:'hos-card-stat-label'}, 'BRL%')
                )
              ),
              current.card_season_label && h('div', {style:{textAlign:'center', fontSize:9, color:'rgba(255,255,255,0.35)', letterSpacing:1, padding:'2px 0 0', fontWeight:600}}, current.card_season_label === '2025' ? "'25 SEASON STATS" : current.card_season_label + ' STATS'),
              // AI Prediction Badge
              h('div', {className:'hos-ai-prediction', style:{background: aiPrediction === 'HIT' ? 'linear-gradient(90deg, #1a472a, #2d6b3f)' : 'linear-gradient(90deg, #5c1a1a, #8b2020)'}},
                h('div', {style:{display:'flex', alignItems:'center', justifyContent:'space-between'}},
                  h('div', {style:{display:'flex', alignItems:'center', gap:6}},
                    h('span', {style:{fontSize:10, color:'rgba(255,255,255,0.6)', fontWeight:700, letterSpacing:1}}, 'AI SAYS'),
                    h('span', {style:{fontSize:14, fontFamily:'Bebas Neue', color:'#fff', letterSpacing:2}}, aiPrediction === 'HIT' ? '\uD83D\uDCA5 HIT' : '\uD83D\uDCA8 SPIT')
                  ),
                  h('div', {style:{fontSize:10, color:'rgba(255,255,255,0.5)'}}, seasonRecord.wins + '-' + seasonRecord.losses + ' record')
                )
              ),
              h('div', {className:'hos-card-footer'}, 'UPPERDECKY.COM \u00B7 HIT OR SPIT')
            )
          )
        )
      ),

        // Right scoreboard - HITS
        h('div', {className:'hos-scoreboard-panel sb-hit'},
          h('div', {className:'sb-emoji'}, '\uD83D\uDC4D'),
          h('div', {className:'sb-num'}, hitCount),
          h('div', {className:'sb-label'}, 'HITS')
        )
      ), // close hos-play-area

      // Swipe labels
      h('div', {className:'hos-swipe-labels'},
        h('div', {className:'hos-swipe-label lbl-spit'}, '\u2190 SPIT'),
        h('div', {className:'hos-swipe-label lbl-hit'}, 'HIT \u2192')
      ),

      // Swipe buttons
      h('div', {className:'hos-swipe-btns'},
        h('button', {className:'hos-swipe-btn btn-spit', onClick: function(){doSwipe('spit');}, disabled: showConsensus}, '\uD83D\uDC4E'),
        h('button', {className:'hos-swipe-btn btn-hit', onClick: function(){doSwipe('hit');}, disabled: showConsensus}, '\uD83D\uDC4D')
      ),

      // AI Prediction reveal (after swipe)
      h('div', {className:'hos-consensus' + (showConsensus ? ' visible' : '')},
        h('div', {className:'hos-consensus-label'}, 'The AI predicted...'),
        h('div', {className:'hos-consensus-bar'},
          h('div', {className: aiPrediction === 'HIT' ? 'hos-consensus-hit' : 'hos-consensus-spit', style:{width:'100%', textAlign:'center', borderRadius:8}}, aiPrediction === 'HIT' ? '\uD83D\uDCA5 HIT \u2014 Going Yard' : '\uD83D\uDCA8 SPIT \u2014 Not Today')
        ),
        h('div', {className:'hos-consensus-total'}, 'HR Probability Score: ' + aiProb.toFixed(1))
      )
    )
  );
}

// ===========================
// APP (ROOT)
// ===========================
function App() {
  var hash = useHashRoute();
  var _batters = useState(null), batters = _batters[0], setBatters = _batters[1];
  var _teams = useState(null), teams = _teams[0], setTeams = _teams[1];
  var _dash = useState(null), dashboard = _dash[0], setDashboard = _dash[1];
  var _llhr = useState(null), llhrData = _llhr[0], setLlhrData = _llhr[1];
  var _loading = useState(true), loading = _loading[0], setLoading = _loading[1];
  var _error = useState(false), error = _error[0], setError = _error[1];
  var _hosOpen = useState(false), hosOpen = _hosOpen[0], setHosOpen = _hosOpen[1];

  function openHoS() { setHosOpen(true); document.body.style.overflow = 'hidden'; }
  function closeHoS() { setHosOpen(false); document.body.style.overflow = ''; }

  var loadInitial = useCallback(function() {
    setLoading(true);
    setError(false);
    Promise.all([
      fetchJSON(API + '/batters.json', 'batters'),
      fetchJSON(API + '/teams.json', 'teams'),
      fetchJSON(API + '/dashboard.json', 'dashboard'),
      fetchJSON(API + '/llhr.json', 'llhr')
    ]).then(function(arr) {
      setBatters(arr[0]);
      setTeams(arr[1]);
      setDashboard(arr[2]);
      setLlhrData(arr[3]);
      setLoading(false);
    }).catch(function() {
      setError(true);
      setLoading(false);
    });
  }, []);

  useEffect(function(){ loadInitial(); }, [loadInitial]);

  // Parse route
  var route = hash.split('?')[0];
  var page;
  if (route === '/' || route === '') {
    page = loading ? h(Loading) : error ? h(ErrorMsg, {onRetry: loadInitial}) : h(HomePage, {batters:batters, teams:teams, dashboard:dashboard, llhr:llhrData, onPlayHoS: openHoS});
  } else if (route === '/players' || route.startsWith('/players?')) {
    page = h(PlayersPage, {batters:batters, teams:teams, dashboard:dashboard});
  } else if (route.match(/^\/player\/(\d+)/)) {
    var playerId = route.match(/^\/player\/(\d+)/)[1];
    page = h(PlayerDetailPage, {id: playerId, key: playerId, dashboard: dashboard});
  } else if (route.match(/^\/team\/([A-Z]+)/)) {
    var teamAbbr = route.match(/^\/team\/([A-Z]+)/)[1];
    page = h(TeamPage, {abbrev: teamAbbr, batters: batters, key: teamAbbr});
  } else if (route === '/compare') {
    page = h(ComparePage, {batters: batters});
  } else if (route.match(/^\/leaderboard\/([\w-]+)/)) {
    var lbType = route.match(/^\/leaderboard\/([\w-]+)/)[1];
    page = h(LeaderboardPage, {type: lbType, key: lbType, dashboard: dashboard});
  } else if (route === '/scatter') {
    page = h(ScatterPage, {dashboard: dashboard});
  } else if (route === '/hit-or-spit') {
    // HoS is an overlay, not a page — redirect to home and open it
    page = loading ? h(Loading) : error ? h(ErrorMsg, {onRetry: loadInitial}) : h(HomePage, {batters:batters, teams:teams, dashboard:dashboard, llhr:llhrData, onPlayHoS: openHoS});
    if (!hosOpen && !loading) { openHoS(); }
  } else {
    page = h('div', {className:'container', style:{padding:'80px 24px', textAlign:'center'}},
      h('h2', null, '404'),
      h('p', {style:{color:'var(--muted)'}}, "Page not found. Maybe it got traded."),
      h('button', {className:'retry-btn', onClick: function(){navigate('/');}}, 'Go Home')
    );
  }

  // SEO: update title/meta on every route change (static pages)
  useEffect(function() {
    var r = hash.split('?')[0];
    // Player and team pages handle their own SEO after data loads
    if (!r.match(/^\/player\//) && !r.match(/^\/team\//)) {
      setRouteSEO(r, {sort: hash.indexOf('?sort=') >= 0 ? hash.split('?sort=')[1] : null});
    }
  }, [hash]);

  return h(Fragment, null,
    h(Navbar, {onPlayHoS: openHoS}),
    page,
    h(Footer),
    hosOpen && h(HitOrSpitOverlay, {batters: batters, onClose: closeHoS})
  );
}

// ===========================
// MOUNT
// ===========================
var root = ReactDOM.createRoot(document.getElementById('root'));
root.render(h(App));
</script>
</body>
</html>
