name: Daily Site Rebuild

on:
  schedule:
    - cron: '0 10 * * *'  # 4am CST (10am UTC)
  workflow_dispatch:  # Manual trigger

jobs:
  rebuild-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Download current site from Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          mkdir -p deploy
          
          # Get the current production deploy ID and site name
          SITE_INFO=$(curl -s -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE_ID")
          DEPLOY_ID=$(echo $SITE_INFO | jq -r '.published_deploy.id')
          SITE_NAME=$(echo $SITE_INFO | jq -r '.name')
          DEPLOY_URL="https://${DEPLOY_ID}--${SITE_NAME}.netlify.app"
          echo "Deploy URL: $DEPLOY_URL"
          
          # Get file listing
          curl -s -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            "https://api.netlify.com/api/v1/deploys/$DEPLOY_ID/files" > files.json
          
          FILE_COUNT=$(jq length files.json)
          echo "Total files: $FILE_COUNT"
          
          # Download each file from deploy URL
          jq -r '.[].path' files.json | while read filepath; do
            dir=$(dirname "deploy$filepath")
            mkdir -p "$dir"
            curl -s -o "deploy$filepath" "${DEPLOY_URL}${filepath}"
          done
          
          echo "Downloaded files:"
          find deploy -type f | wc -l

      - name: Ensure copyright is current year
        run: |
          YEAR=$(date +%Y)
          find deploy -name '*.html' -exec sed -i "s/UpperDecky .* 20[0-9][0-9]/UpperDecky \\\&copy; $YEAR/g" {} + || true
          echo "Copyright set to $YEAR"

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: './deploy'
          production-deploy: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
