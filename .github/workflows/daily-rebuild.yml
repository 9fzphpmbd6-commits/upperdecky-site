name: Daily Data Refresh & Deploy

on:
  schedule:
    - cron: '0 10 * * *'  # 4am CST / 5am CDT (10am UTC) — daily
  workflow_dispatch:  # Manual trigger

jobs:
  refresh-data-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run data refresh script
        run: |
          # Create output dir for fresh data
          mkdir -p fresh-api

          # Copy existing trackers so prediction records persist
          if [ -f api/hos-tracker.json ]; then
            cp api/hos-tracker.json fresh-api/hos-tracker.json
          fi
          if [ -f api/pressbox-tracker.json ]; then
            cp api/pressbox-tracker.json fresh-api/pressbox-tracker.json
          fi

          OUT_DIR=fresh-api python3 scripts/refresh-data.py

          echo ""
          echo "=== Generated files ==="
          find fresh-api -type f | head -30
          echo "..."
          find fresh-api -type f | wc -l
          echo "total files"

      - name: Prepare deploy folder
        run: |
          # Copy the full site into deploy/
          mkdir -p deploy
          cp index.html deploy/
          cp -r api deploy/

          # Overwrite api/ with the fresh data we just fetched
          cp -r fresh-api/* deploy/api/

          # Preserve llhr.json if it exists (manually curated)
          if [ -f api/llhr.json ]; then
            cp api/llhr.json deploy/api/llhr.json
          fi

          echo "Deploy folder ready:"
          ls -la deploy/
          echo ""
          echo "API files:"
          find deploy/api -type f | wc -l

      - name: Commit updated tracker back to repo
        run: |
          # Copy fresh tracker and picks back to repo api/
          cp fresh-api/hos-tracker.json api/hos-tracker.json 2>/dev/null || true
          cp fresh-api/hos-picks.json api/hos-picks.json 2>/dev/null || true
          cp fresh-api/pressbox-tracker.json api/pressbox-tracker.json 2>/dev/null || true
          cp fresh-api/pressbox.json api/pressbox.json 2>/dev/null || true

          git config user.name "UpperDecky Bot"
          git config user.email "bot@upperrdecky.com"
          git add api/hos-tracker.json api/hos-picks.json api/pressbox-tracker.json api/pressbox.json
          git diff --cached --quiet || git commit -m "Daily update: HoS picks + prediction record [skip ci]"
          git push || true

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: './deploy'
          production-deploy: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
